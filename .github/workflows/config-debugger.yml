name: OpenWrt Config Debugger

# 仅支持在 GitHub 页面手动点击触发
on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  SSH_DEBUG: true # 【关键开关】设为 true 开启网页终端调试，设为 false 则直接跑完看结果

jobs:
  debug_config:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install gawk git gettext libssl-dev ncurses-dev unzip build-essential python3
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration (.config & DIY2)
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Run defconfig (The Moment of Truth)
      run: |
        cd openwrt
        echo "========= 正在执行依赖树校对 (make defconfig) ========="
        make defconfig
        echo "========= 校对完成 ========="

    - name: Diagnostic Grep (Logs Inspection)
      run: |
        cd openwrt
        echo "========================================================="
        echo "                 🔍 自动检索诊断报告                     "
        echo "========================================================="
        
        echo "【1. 代理核心状态】"
        grep -E "CONFIG_PACKAGE_luci-app-openclash|CONFIG_PACKAGE_adguardhome|CONFIG_PACKAGE_smartdns" .config || echo "❌ 警告：你选的核心插件被系统抹除了！"
        
        echo -e "\n【2. 强制剥离组件状态 (应显示为 is not set 或无输出)】"
        grep -E "CONFIG_PACKAGE_ttyd|CONFIG_PACKAGE_luci-app-ddns" .config || echo "✅ 恭喜：剥离组件成功，未被硬编码拉回。"
        
        echo -e "\n【3. 编译器优化参数】"
        grep -E "CONFIG_TARGET_OPTIMIZATION|CONFIG_TARGET_LTO" .config || echo "❌ 优化参数丢失！"
        
        echo -e "\n【4. 无线驱动与无线高级组件】"
        grep -E "CONFIG_PACKAGE_wpad-basic-openssl|CONFIG_PACKAGE_kmod-crypto-hw-safexcel" .config || echo "⚠️ 提示：安全加密/精简无线组件状态异常。"
        echo "========================================================="

    - name: Upload Checked .config
      uses: actions/upload-artifact@v4
      with:
        name: verified-defconfig-${{ github.run_id }}
        path: openwrt/.config

    - name: SSH connection to Actions for Interactive Debugging
      uses: P3TERX/ssh2actions@main
      if: env.SSH_DEBUG == 'true'
